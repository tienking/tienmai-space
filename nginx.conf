server {
    listen 80;
    server_name tienmai.space www.tienmai.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tienmai.space www.tienmai.space;

    ssl_certificate /etc/letsencrypt/live/tienmai.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tienmai.space/privkey.pem;

    root /root/tienmai-bot/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /admin {
        alias /root/tienmai-bot/frontend/dist;
        try_files /admin.html /admin.html;
    }

    location /jobtracker {
        alias /root/tienmai-bot/frontend/dist;
        try_files /jobtracker.html /jobtracker.html;
    }

    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
